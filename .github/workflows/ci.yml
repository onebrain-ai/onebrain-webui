name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test
      - name: build
        run: npm run build
      - name: offline guard (no external font/CDN refs in dist)
        run: node scripts/check-offline.mjs
