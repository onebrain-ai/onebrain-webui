name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # jsdom@28 (via vitest) needs Node >=20.19; 22 is the current LTS.
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: test + coverage gate
        run: npm run test:coverage
      - name: build
        run: npm run build
      - name: offline guard (no external font/CDN refs in dist)
        run: node scripts/check-offline.mjs
